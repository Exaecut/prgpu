name: "Build and Deploy Effects"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-effects-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & Deploy on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_INCREMENTAL: "0"
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      INSTALLER_CERTIFICATE_BASE64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM: ${{ secrets.APPLE_TEAM }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive
          fetch-depth: 0

      - name: Authenticate Git for Private Dependencies
        shell: bash
        run: |
          git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc

      - name: Setup rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: build-cache-${{ runner.os }}
          cache-all-crates: true
          cache-targets: true

      - name: Install CUDA Toolkit
        id: cuda-toolkit
        shell: pwsh
        run: |
          $version = "12.5.0"
          $short   = "12.5"
          $url     = "https://developer.download.nvidia.com/compute/cuda/$version/network_installers/cuda_${version}_windows_network.exe"

          Write-Host "Downloading CUDA $version network installer..."
          Invoke-WebRequest -Uri $url -OutFile cuda_installer.exe -UseBasicParsing

          Write-Host "Installing selected sub-packages (nvcc, cudart, cudart_dev, cublas, cublas_dev)..."
          $packages = "nvcc_$short cudart_$short cudart_dev_$short cublas_$short cublas_dev_$short"
          Start-Process -FilePath .\cuda_installer.exe `
            -ArgumentList "-s $packages" `
            -Wait -NoNewWindow

          $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v$short"
          Write-Host "CUDA installed at: $cudaPath"

          # Replicate the outputs that Jimver/cuda-toolkit provides so downstream
          # steps using steps.cuda-toolkit.outputs.CUDA_PATH require no changes.
          "CUDA_PATH=$cudaPath" | Out-File -Append $env:GITHUB_OUTPUT
          "CUDA_PATH=$cudaPath" | Out-File -Append $env:GITHUB_ENV

      - name: Cargo fetch
        shell: bash
        run: cargo fetch

      - name: Detect changed plugins
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            BASE="origin/${{ github.base_ref }}"
            HEAD="${{ github.sha }}"
          else
            HEAD="${{ github.sha }}"
            BASE="${{ github.event.before }}"
            if [[ -z "${BASE}" || "${BASE}" == "0000000000000000000000000000000000000000" ]]; then
              BASE="$(git rev-parse "${HEAD}^" || echo "")"
            fi
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE}" "${HEAD}" || true)"
          ALL_PLUGINS="$(find . -mindepth 2 -maxdepth 2 -type f -name Cargo.toml -exec dirname {} \; | awk -F/ 'NF==2' | while read d; do if [[ -f "$d/build.rs" ]]; then printf '%s\n' "${d#./}"; fi; done | sort -u)"

          GLOBAL=false
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            case "$f" in
              # REQ 1 Fix: Removed Cargo.toml and Cargo.lock from global triggers.
              # They are now handled by the directory-crawling logic below.
              build_all.sh|plugin_build.sh|new_effect.sh|.github/workflows/*|prgpu|prgpu/*)
                GLOBAL=true
                break
                ;;
            esac
          done <<< "${CHANGED_FILES}"

          if $GLOBAL; then
            CHANGED_DIRS="$(printf '%s\n' "${ALL_PLUGINS}" | tr '\n' ' ' | sed 's/ $//')"
          else
            TMP_LIST=""
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              dir="$f"
              while [[ "$dir" != "." && "$dir" != "/" ]]; do
                if [[ -f "$dir/Cargo.toml" && -f "$dir/build.rs" ]]; then
                  TMP_LIST="${TMP_LIST}\n${dir#./}"
                  break
                fi
                dir="$(dirname "$dir")"
              done
            done <<< "${CHANGED_FILES}"
            CHANGED_DIRS="$(printf '%b' "${TMP_LIST}" | sed '/^$/d' | sort -u | tr '\n' ' ' | sed 's/ $//')"
          fi

          if [[ -n "${CHANGED_DIRS:-}" ]]; then
            COUNT=$(wc -w <<< "${CHANGED_DIRS}" | tr -d ' ')
          else
            COUNT=0
          fi

          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "CHANGED_PLUGIN_DIRS=${CHANGED_DIRS}" >> "$GITHUB_ENV"
          # REQ 1: Create bridge file for the deployment scripts
          echo "${CHANGED_DIRS}" | tr ' ' ',' > changed_plugins.txt

      - name: Run build_all.sh for changed plugins
        if: ${{ steps.changes.outputs.count != '0' }}
        shell: bash
        env:
          NO_INSTALL: true
          NO_SIGN: true
          CICD: true
        run: bash ./build_all.sh release

      - name: Upload artifacts
        if: ${{ steps.changes.outputs.count != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: effects-${{ runner.os }}
          path: |
            target/release/*.aex
            target/release/*.plugin
            Cargo.toml
            changed_plugins.txt
          if-no-files-found: error

      - name: Publish artifacts to Exaecut
        if: ${{ steps.changes.outputs.count != '0' }}
        uses: Exaecut/publish-exaecut-product@main
        with:
          endpoint: ${{ secrets.EXAECUT_ENDPOINT }}
          secret-key: ${{ secrets.EXAECUT_SECRET_KEY }}
          artifact-name: effects-${{ runner.os }}
          dry-run: "false"
