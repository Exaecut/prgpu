name: "Build Effects"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-effects-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build changed plugins on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_INCREMENTAL: "0"
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      INSTALLER_CERTIFICATE_BASE64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM: ${{ secrets.APPLE_TEAM }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Authenticate Git for Private Dependencies
        shell: bash
        run: |
          git config --global url."https://${{ secrets.PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc

      - name: Setup rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          cache-on-failure: true
          shared-key: build-cache-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          cache-all-crates: true
          cache-targets: true

      - name: cuda-toolkit
        id: cuda-toolkit
        if: ${{ matrix.os == 'windows-latest' }}
        uses: N-Storm/cuda-toolkit@v0.2.27m
        with:
          cuda: '12.5.0'
          method: 'local'
          use-github-cache: false
          use-local-cache: false

      - name: Cargo fetch
        shell: bash
        run: cargo fetch

      - name: Detect changed plugins
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            BASE="origin/${{ github.base_ref }}"
            HEAD="${{ github.sha }}"
          else
            HEAD="${{ github.sha }}"
            BASE="${{ github.event.before }}"
            if [[ -z "${BASE}" || "${BASE}" == "0000000000000000000000000000000000000000" ]]; then
              BASE="$(git rev-parse "${HEAD}^" || echo "")"
            fi
          fi
          echo "Diff base: ${BASE}"
          echo "Diff head: ${HEAD}"

          CHANGED_FILES="$(git diff --name-only "${BASE}" "${HEAD}" || true)"
          echo "Changed files:"
          printf '%s\n' "${CHANGED_FILES}"

          ALL_PLUGINS="$(
            find . -mindepth 2 -maxdepth 2 -type f -name Cargo.toml -exec dirname {} \; \
            | awk -F/ 'NF==2' \
            | while read d; do
                if [[ -f "$d/build.rs" ]]; then
                  printf '%s\n' "${d#./}"
                fi
              done \
            | sort -u
          )"
          echo "All plugins:"
          printf '%s\n' "${ALL_PLUGINS}"

          GLOBAL=false
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            case "$f" in
              Cargo.toml|Cargo.lock|build_all.sh|plugin_build.sh|new_effect.sh|.github/workflows/*|prgpu|prgpu/*)
                GLOBAL=true
                break
                ;;
            esac
          done <<< "${CHANGED_FILES}"

          if $GLOBAL; then
            CHANGED_DIRS="$(printf '%s\n' "${ALL_PLUGINS}" | tr '\n' ' ' | sed 's/ $//')"
          else
            TMP_LIST=""
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              dir="$f"
              while [[ "$dir" != "." && "$dir" != "/" ]]; do
                if [[ -f "$dir/Cargo.toml" && -f "$dir/build.rs" ]]; then
                  rel="${dir#./}"
                  TMP_LIST="${TMP_LIST}\n${rel}"
                  break
                fi
                dir="$(dirname "$dir")"
              done
            done <<< "${CHANGED_FILES}"
            CHANGED_DIRS="$(printf '%b' "${TMP_LIST}" | sed '/^$/d' | sort -u | tr '\n' ' ' | sed 's/ $//')"
          fi

          if [[ -n "${CHANGED_DIRS:-}" ]]; then
            COUNT=$(wc -w <<< "${CHANGED_DIRS}" | tr -d ' ')
          else
            COUNT=0
          fi

          echo "Changed plugin dirs: ${CHANGED_DIRS}"
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "CHANGED_PLUGIN_DIRS=${CHANGED_DIRS}" >> "$GITHUB_ENV"

      - name: No changes - skip build
        if: ${{ steps.changes.outputs.count == '0' }}
        run: echo "No plugin changes detected. Skipping build."

      - name: Run build_all.sh for changed plugins
        if: ${{ steps.changes.outputs.count != '0' }}
        shell: bash
        env:
          NO_INSTALL: true
          NO_SIGN: true
          CICD: true
        run: |
          echo "Will build: ${CHANGED_PLUGIN_DIRS}"
          bash ./build_all.sh release
