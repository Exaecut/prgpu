name: "Deploy Effects"

on:
    workflow_run:
        workflows: ["Build Effects"]
        types: [completed]
        branches: [main]

concurrency:
    group: deploy-effects-${{ github.sha }}
    cancel-in-progress: false

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [macos-latest, ubuntu-latest]

        steps:
            - uses: actions/checkout@v4

            - name: Download artifacts from build
              uses: actions/download-artifact@v4
              with:
                  name: effects-${{ matrix.os == 'macos-latest' && 'macOS' || 'windows' }}
                  path: ${{ runner.temp }}/artifacts
                  run-id: ${{ github.event.workflow_run.id }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
            - uses: ./Exaecut/publish-exaecut-product
              env:
                  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
                  INSTALLER_CERTIFICATE_BASE64: ${{ secrets.INSTALLER_CERTIFICATE_BASE64 }}
                  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM: ${{ secrets.APPLE_TEAM }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              with:
                  endpoint: ${{ secrets.EXAECUT_ENDPOINT }}
                  secret-key: ${{ secrets.EXAECUT_SECRET_KEY }}
                  artifact-name: effects-${{ matrix.os == 'macos-latest' && 'macOS' || 'windows' }}
                  dry-run: "false"
                  changed-plugins: ${{ github.event.workflow_run.outputs.changed_plugins }}
