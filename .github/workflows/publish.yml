name: Publish prgpu + prgpu-macro to crates.io

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
      - 'prgpu-macro/Cargo.toml'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish changed crates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Refresh vendored vekl before publish
        run: |
          # The authoritative vekl lives at github.com/Exaecut/vekl and is
          # NOT committed into this repo (see .gitignore). Clone it fresh so
          # the published tarball ships with the latest vekl bundled for
          # crates.io consumers. Strip .git so the tree is publish-ready.
          rm -rf vekl
          git clone --depth 1 https://github.com/Exaecut/vekl.git vekl
          rm -rf vekl/.git

      - name: Publish crates whose on-disk version isn't on crates.io yet
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Extract `version = "X.Y.Z"` from a Cargo.toml on disk.
          version_of() {
            local file="$1"
            awk -F'"' '/^version = "/ { print $2; exit }' "$file"
          }

          # Return 0 if <pkg> <version> is already on crates.io, else 1.
          already_published() {
            local pkg="$1" version="$2"
            local code
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://crates.io/api/v1/crates/$pkg/$version")
            [[ "$code" == "200" ]]
          }

          publish_if_needed() {
            local pkg="$1" manifest_path="$2"
            local v
            v=$(version_of "$manifest_path" || true)
            if [[ -z "$v" ]]; then
              echo "::warning::$pkg: no version in $manifest_path, skipping"
              return 0
            fi
            if already_published "$pkg" "$v"; then
              echo "$pkg v$v: already on crates.io, skipping"
              return 0
            fi
            echo "::notice::Publishing $pkg v$v"
            cargo publish -p "$pkg" --allow-dirty \
              || cargo_publish_retry "$pkg" "$v"
          }

          # Retry up to 3 extra times on transient failures (rate limit,
          # sparse-index lag, etc). 60s between attempts.
          cargo_publish_retry() {
            local pkg="$1" version="$2"
            local attempt
            for attempt in 2 3 4; do
              echo "::warning::$pkg v$version publish attempt $attempt after 60s sleep"
              sleep 60
              # Re-check in case a parallel workflow beat us to it.
              if already_published "$pkg" "$version"; then
                echo "$pkg v$version: landed on crates.io between attempts, skipping"
                return 0
              fi
              if cargo publish -p "$pkg" --allow-dirty; then
                return 0
              fi
            done
            echo "::error::$pkg v$version publish failed after 4 attempts"
            return 1
          }

          # Order: prgpu-macro first (prgpu depends on it).
          publish_if_needed prgpu-macro prgpu-macro/Cargo.toml

          # Let the crates.io sparse index catch up if we actually uploaded a
          # new prgpu-macro before prgpu tries to resolve it.
          sleep 60

          publish_if_needed prgpu Cargo.toml
