name: Publish prgpu crates to crates.io

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish changed crates
    # macos-latest is required because cargo publish verifies by compiling
    # the full dep graph. prgpu depends on `exaecut-after-effects`, which is
    # #[cfg(target_os)]-gated to macOS + Windows only — verify fails on Linux.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Refresh vendored vekl before publish
        run: |
          # The authoritative vekl lives at github.com/Exaecut/vekl and is
          # NOT committed into this repo (see .gitignore). Clone it fresh so
          # the published tarball ships with the latest vekl bundled for
          # crates.io consumers. Strip .git so the tree is publish-ready.
          rm -rf vekl
          git clone --depth 1 https://github.com/Exaecut/vekl.git vekl
          rm -rf vekl/.git


      - name: Publish crates whose on-disk version isn't on crates.io yet
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          UA='exaecut-publish-ci (marvin.cano@exaecut.io)'

          # Returns 0 if <pkg>@<version> is already on crates.io, else 1.
          # crates.io 403s plain curl in some regions, so send a real UA.
          # `|| true` keeps a transient network blip from aborting the run under
          # `set -e`; a non-200 just means "treat as not live" and cargo's own
          # check plus the retry loop catch any false negative.
          already_published() {
            local pkg="$1" version="$2" code
            code=$(curl -s -o /dev/null -w '%{http_code}' -A "$UA" \
              "https://crates.io/api/v1/crates/$pkg/$version" || true)
            [[ "$code" == "200" ]]
          }

          # Emit "name version" for every publishable workspace member.
          # publish == null means publishable anywhere; an empty array means
          # `publish = false`. Hardcoding no crate names keeps this generic as
          # the workspace grows.
          publishable_members() {
            cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[]
                  | select(.publish == null or (.publish | index("crates-io")))
                  | "\(.name) \(.version)"'
          }

          # Populate the PENDING array with `-p <name>` for each member whose
          # on-disk version is not yet live. Recomputed every attempt so a
          # mid-batch failure self-heals: already-uploaded crates drop out.
          collect_pending() {
            local name version
            PENDING=()
            while read -r name version; do
              [[ -z "$name" ]] && continue
              if already_published "$name" "$version"; then
                echo "$name v$version: already on crates.io, skipping"
              else
                echo "::notice::$name v$version queued for publish"
                PENDING+=( -p "$name" )
              fi
            done < <(publishable_members)
          }

          # Cargo (>=1.90) publishes a multi-`-p` set in dependency order and
          # waits for the crates.io index between uploads, so prgpu-build/
          # prgpu-macro land and propagate before prgpu's verify resolves them.
          # No manual ordering or index sleeps required.
          attempt=0
          while :; do
            attempt=$((attempt + 1))
            collect_pending
            if [[ ${#PENDING[@]} -eq 0 ]]; then
              echo "All publishable crates are already live — nothing to do."
              break
            fi
            echo "::notice::Publishing (attempt $attempt): ${PENDING[*]}"
            if cargo publish "${PENDING[@]}" --allow-dirty; then
              echo "::notice::Published: ${PENDING[*]}"
              break
            fi
            if [[ "$attempt" -ge 4 ]]; then
              echo "::error::cargo publish failed after $attempt attempts"
              exit 1
            fi
            echo "::warning::publish attempt $attempt failed; retrying in 60s"
            sleep 60
          done
