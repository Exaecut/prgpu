name: Publish prgpu + prgpu-macro to crates.io

on:
  push:
    branches: [main, master]
    paths:
      - 'Cargo.toml'
      - 'prgpu-macro/Cargo.toml'
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish changed crates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Refresh vendored vekl before publish
        run: |
          # The authoritative vekl lives at github.com/Exaecut/vekl and is
          # NOT committed into this repo (see .gitignore). Clone it fresh so
          # the published tarball ships with the latest vekl bundled for
          # crates.io consumers. Strip .git so the tree is publish-ready.
          rm -rf vekl
          git clone --depth 1 https://github.com/Exaecut/vekl.git vekl
          rm -rf vekl/.git

      - name: Publish crates whose on-disk version isn't on crates.io yet
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Extract `version = "X.Y.Z"` from a Cargo.toml on disk.
          version_of() {
            local file="$1"
            awk -F'"' '/^version = "/ { print $2; exit }' "$file"
          }

          # Probe crates.io with a User-Agent that their API prefers
          # (plain curl has been observed to return 403 in some regions).
          # Returns 0 if the <pkg>@<version> is on crates.io, else 1.
          already_published() {
            local pkg="$1" version="$2"
            local code
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -A 'exaecut-publish-ci (marvin.cano@exaecut.io)' \
              "https://crates.io/api/v1/crates/$pkg/$version")
            [[ "$code" == "200" ]]
          }

          # Try to publish once. Return 0 on success OR if cargo itself says
          # the version is already live (idempotent success). Return 1 only
          # on a real transient error.
          try_publish() {
            local pkg="$1" version="$2"
            local output exit_code
            output=$(cargo publish -p "$pkg" --allow-dirty 2>&1) && exit_code=0 || exit_code=$?
            printf '%s\n' "$output"
            if [[ "$exit_code" -eq 0 ]]; then
              return 0
            fi
            if printf '%s' "$output" | grep -q "already exists on crates.io index"; then
              echo "::notice::$pkg v$version already on crates.io — idempotent success"
              return 0
            fi
            return 1
          }

          publish_if_needed() {
            local pkg="$1" manifest_path="$2"
            local v
            v=$(version_of "$manifest_path" || true)
            if [[ -z "$v" ]]; then
              echo "::warning::$pkg: no version in $manifest_path, skipping"
              return 0
            fi
            if already_published "$pkg" "$v"; then
              echo "$pkg v$v: already on crates.io, skipping"
              return 0
            fi
            echo "::notice::Publishing $pkg v$v"
            local attempt
            for attempt in 1 2 3 4; do
              if [[ "$attempt" -gt 1 ]]; then
                echo "::warning::$pkg v$v attempt $attempt after 60s sleep"
                sleep 60
              fi
              if try_publish "$pkg" "$v"; then
                return 0
              fi
            done
            echo "::error::$pkg v$v publish failed after 4 attempts"
            return 1
          }

          # Order: prgpu-macro first (prgpu depends on it).
          publish_if_needed prgpu-macro prgpu-macro/Cargo.toml

          # Only wait on the index if we actually uploaded something new;
          # `already_published` or the "already exists" short-circuit skip
          # this sleep on no-op re-runs.
          if ! already_published prgpu "$(version_of Cargo.toml)"; then
            sleep 60
          fi

          publish_if_needed prgpu Cargo.toml
