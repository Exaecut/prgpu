[package]
name = "prgpu"
version = "0.1.1"
edition = "2024"

[features]
default = ["cargo-clippy"] # build with no Metal backend by default
opencl = ["opencl3"]       # enable OpenCL backend
cargo-clippy = []
shader_hotreload = []      # enable shader hot-reloading (for development only)

[dependencies]
after-effects = { git = "https://github.com/Exaecut/after-effects.git", branch = "master", features = [
	"catch-panics",
] }
premiere = { git = "https://github.com/Exaecut/after-effects.git", branch = "master" }
bytemuck = { version = "1.23.1", features = ["derive"] }
parking_lot = "0.12.3"
paste = "1.0.15"

[target.'cfg(target_os = "macos")'.dependencies]
objc = { version = "0.2.7" }

[target.'cfg(target_os = "windows")'.dependencies]
cudarc = { version = "0.19.0", features = ["cuda-12050"] }
opencl3 = { version = "0.12.1", optional = true }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
	"cfg(shader_hotreload)",
	"cfg(does_dialog)",
	"cfg(with_premiere)",
	"cfg(threaded_rendering)",
] }
